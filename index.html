    (98,'LN-0198-FGH','Egon Spengler','Ohio','2026-06-08 10:38','sorting'),
    (99,'LN-0199-IJK','Winston Zeddemore','Flint','2026-06-08 10:40','delivered'),
    (100,'LN-0200-LMN','Louis Tully','Canada','2026-06-08 10:42','in_transit');
`);

  document.getElementById('loading').style.display = 'none';
  buildSchema();

}

// ── SCHEMA PANEL ──
function buildSchema() {
  const scroll = document.getElementById('schema-scroll');
  scroll.innerHTML = SCHEMA.map(t => `
    <div class="table-group">
      <div class="table-name" onclick="toggleTable(this)">
        <span class="arrow">▶</span>
        <span>${t.name}</span>
      </div>
      <div class="table-cols">
        ${t.cols.map(c => `
          <div class="col-row">
            <span class="col-name">${c.name}</span>
            <span class="col-type">${c.type}</span>
            ${c.pk ? '<span class="col-pk">PK</span>' : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleTable(el) {
  el.classList.toggle('open');
}

// ── RUN SQL ──
function runSQL() {
  const query = document.getElementById('sql-editor').value.trim();
  if (!query || !db) return;

  const scroll = document.getElementById('results-scroll');
  const rowsEl = document.getElementById('rows-count');

  try {
    const results = db.exec(query);

    if (!results.length) {
      scroll.innerHTML = '<div class="result-msg">Query executed. No rows returned.</div>';
      rowsEl.textContent = '0 rows';
      return;
    }

    const { columns, values } = results[0];
    const rowCount = values.length;
    rowsEl.textContent = rowCount + ' row' + (rowCount !== 1 ? 's' : '') + ' returned';

    scroll.innerHTML = `
      <table class="result-table">
        <thead>
          <tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr>
        </thead>
        <tbody>
          ${values.map(row => `<tr>${row.map(v => `<td>${v === null ? '<span style="color:var(--text3)">NULL</span>' : v}</td>`).join('')}</tr>`).join('')}
        </tbody>
      </table>
    `;
  } catch (e) {
    scroll.innerHTML = `<div class="result-msg error">ERROR: ${e.message}</div>`;
    rowsEl.textContent = '';
  }
}

// ── STARS ──
function buildStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star' + (Math.random() > 0.7 ? ' big' : '');
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*5}s;--dl:${Math.random()*5}s`;
    c.appendChild(s);
  }
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runSQL();
  }
});

// ── START ──
initDB().catch(err => {
  document.getElementById('loading').innerHTML = `
    <h2 style="color:var(--red)">Failed to load database</h2>
    <p>${err.message}</p>
  `;
});
</script>
</body>
</html>
