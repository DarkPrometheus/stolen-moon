<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locations — Lunara City PD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #090c13;
      --bg2: #0c1018;
      --bg3: #0f1520;
      --border: #1c2a3a;
      --border2: #253545;
      --text: #c0d0e0;
      --text2: #7090a8;
      --text3: #405060;
      --accent: #4a9eda;
      --gold: #e8d5a3;
      --red: #cc5555;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* STARS */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: #4a7a9a;
      border-radius: 50%;
      animation: tw var(--d) ease-in-out infinite var(--dl);
    }
    @keyframes tw {
      0%,100% { opacity: 0.04; }
      50% { opacity: 0.35; }
    }

    /* DARK SKY — top glow where moon used to be */
    .sky-void {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 200px;
      background: radial-gradient(ellipse at top, #0d1f35 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* CARD */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 1.5rem;
      animation: fadein 1.4s ease both;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .case-badge {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text3);
      border: 1px solid var(--border);
      padding: 3px 12px;
      margin-bottom: 1.5rem;
      background: var(--bg2);
    }

    .city-name {
      font-family: 'Crimson Pro', serif;
      font-size: 2.6rem;
      color: var(--gold);
      font-weight: 600;
      line-height: 1;
      margin-bottom: 0.4rem;
      letter-spacing: -0.5px;
    }

    .city-sub {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text3);
      margin-bottom: 1.8rem;
    }

    .divider-line {
      width: 60px;
      height: 1px;
      background: var(--border2);
      margin: 0 auto 1.8rem;
    }

    .instruction {
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      color: var(--text2);
      font-style: italic;
      line-height: 1.7;
    }

    /* INPUT GROUP */
    .input-group {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
    }

    .location-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }

    .location-input::placeholder {
      color: var(--text3);
    }

    .location-input:focus {
      border-color: var(--accent);
    }

    .location-input.error {
      border-color: var(--red);
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .btn-go {
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 10px 16px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-go:hover {
      background: #0d1e35;
      border-color: var(--accent);
    }

    .btn-go:active {
      transform: scale(0.98);
    }

    /* HINT TEXT */
    .hint-text {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.5px;
      line-height: 1.6;
      min-height: 16px;
      transition: color 0.2s;
    }

    .hint-text.error-msg {
      color: var(--red);
    }

    /* FOOTER */
    .footer {
      margin-top: 3.5rem;
      text-align: center;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 1px;
      line-height: 2;
      border-top: 1px solid var(--border);
      padding-top: 1.2rem;
    }

    /* CURSOR BLINK on badge */
    .blink {
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="sky-void"></div>

<div class="card">

  <div class="header">
    <div class="case-badge">LUNARA CITY PD — FIELD DATABASE</div>
    <div class="city-name">Locations</div>
    <div class="city-sub">CASE #0047 — THE STOLEN MOON</div>
    <div class="divider-line"></div>
    <div class="instruction">
      Enter a location name to access its field record.<span class="blink">_</span>
    </div>
  </div>

  <div class="hint-text" id="hint-text">Type a location name and press GO or hit Enter.</div>
  <div class="input-group">
    <input
      class="location-input"
      id="location-input"
      type="text"
      placeholder="location-name"
      autocomplete="off"
      spellcheck="false"
    >
    <button class="btn-go" id="btn-go" onclick="navigate()">GO →</button>
  </div>

  <div class="footer">
    THE MOON HAS BEEN MISSING FOR<br>
    <span id="elapsed" style="color: var(--text2);">—</span> HOURS<br>
    THE SKY REMAINS DARK
  </div>

</div>

<script>
  // STARS
  const s = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    const size = Math.random() > 0.75 ? 2 : 1;
    el.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*6}s;--dl:${Math.random()*6}s`;
    s.appendChild(el);
  }

  // ELAPSED TIME since moon disappeared
  const moonGoneAt = new Date('2026-06-09T02:17:00'); // Corregido el año según tu lore de 2024
  function updateElapsed() {
    const now = new Date();
    const diff = Math.floor((now - moonGoneAt) / 1000 / 60 / 60);
    document.getElementById('elapsed').textContent = diff.toLocaleString();
  }
  updateElapsed();
  setInterval(updateElapsed, 60000);

  // NAVIGATE WITH 404 VALIDATION
  async function navigate() {
    const input = document.getElementById('location-input');
    const hint = document.getElementById('hint-text');
    const val = input.value.trim().toLowerCase().replace(/\s+/g, '-');

    if (!val) {
      input.classList.add('error');
      hint.classList.add('error-msg');
      hint.textContent = 'Enter a location name to proceed.';
      setTimeout(() => {
        input.classList.remove('error');
        hint.classList.remove('error-msg');
        hint.textContent = 'Type a location name and press GO or hit Enter.';
      }, 2000);
      return;
    }

    hint.textContent = 'Accessing location records...';
    
    const targetUrl = './locations/' + val + '.html';

    try {
      // Validamos si el archivo existe haciendo una petición rápida HEAD
      const response = await fetch(targetUrl, { method: 'HEAD' });
      
      if (response.ok) {
        // Si el archivo existe (status 200-299), redirigimos normalmente
        window.location.href = targetUrl;
      } else {
        // Si responde pero no es correcto (ej. 404), vamos al 404 personalizado
        window.location.href = './404.html';
      }
    } catch (error) {
      // Si falla por completo (por ejemplo, haciendo pruebas locales sin servidor web),
      // por seguridad forzamos la redirección directa al 404.html
      window.location.href = './404.html';
    }
  }

  // ENTER KEY
  document.getElementById('location-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') navigate();
  });

  // AUTO FORMAT input as slug
  document.getElementById('location-input').addEventListener('input', function() {
    const hint = document.getElementById('hint-text');
    hint.classList.remove('error-msg');
    hint.textContent = 'Type a location name and press GO or hit Enter.';
  });
</script>

</body>
</html>
